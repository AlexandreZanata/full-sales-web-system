# HTTP domain bootstrap before certbot — placeholders via install-nginx-domain.sh

upstream fullsales_api {
    server 127.0.0.1:API_PORT;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_API;
    client_max_body_size 32m;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location / {
        proxy_pass http://fullsales_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_APEX;
    root APP_DIR/apps/portal/dist;
    index index.html;
    client_max_body_size 32m;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host DOMAIN_API;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}

