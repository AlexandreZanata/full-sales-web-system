# HTTP bootstrap — placeholders via install-nginx-domain.sh
# DOMAIN_APP = API + /admin + /platform | DOMAIN_CATALOG = portal

upstream fullsales_api {
    server 127.0.0.1:API_PORT;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_APP;
    client_max_body_size 32m;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health {
        proxy_pass http://fullsales_api;
        proxy_set_header Host $host;
    }
    location = /admin { return 302 /admin/; }
    location ^~ /admin/ {
        alias APP_DIR/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
    location = /platform { return 302 /platform/; }
    location ^~ /platform/ {
        alias APP_DIR/apps/platform-admin/dist/;
        try_files $uri $uri/ /platform/index.html;
    }
    location / {
        return 302 /admin/;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_CATALOG;
    root APP_DIR/apps/portal/dist;
    index index.html;
    client_max_body_size 32m;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health {
        proxy_pass http://fullsales_api;
        proxy_set_header Host $host;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
