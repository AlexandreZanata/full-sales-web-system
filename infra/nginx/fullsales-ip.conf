# HTTP-only IP bootstrap — portal + /v1 (admin/platform need domain mode).
# Placeholders: YOUR_VPS_IP, NGINX_HTTP_PORT, API_PORT, APP_DIR

upstream fullsales_api {
    server 127.0.0.1:API_PORT;
    keepalive 32;
}

server {
    listen NGINX_HTTP_PORT;
    listen [::]:NGINX_HTTP_PORT;
    server_name YOUR_VPS_IP;

    root APP_DIR/apps/portal/dist;
    index index.html;
    client_max_body_size 32m;

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://fullsales_api/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
