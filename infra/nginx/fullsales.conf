# HTTPS — placeholders via install-nginx-domain.sh
# DOMAIN_APP = API + /admin + /platform | DOMAIN_CATALOG = portal

upstream fullsales_api {
    server 127.0.0.1:API_PORT;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_APP DOMAIN_CATALOG;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_APP;

    ssl_certificate /etc/letsencrypt/live/DOMAIN_APP/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_APP/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://fullsales_api;
        proxy_set_header Host $host;
    }

    location = /admin { return 302 /admin/; }
    location ^~ /admin/ {
        alias APP_DIR/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /platform { return 302 /platform/; }
    location ^~ /platform/ {
        alias APP_DIR/apps/platform-admin/dist/;
        try_files $uri $uri/ /platform/index.html;
    }

    location / {
        return 302 /admin/;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_CATALOG;

    ssl_certificate /etc/letsencrypt/live/DOMAIN_APP/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_APP/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root APP_DIR/apps/portal/dist;
    index index.html;
    client_max_body_size 32m;

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://fullsales_api;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
