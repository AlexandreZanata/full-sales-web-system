# Domain HTTPS — placeholders replaced by install-nginx-domain.sh
# DOMAIN_APEX / DOMAIN_ADMIN / DOMAIN_API / DOMAIN_PLATFORM / APP_DIR / API_PORT

upstream fullsales_api {
    server 127.0.0.1:API_PORT;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_APEX DOMAIN_ADMIN DOMAIN_API DOMAIN_PLATFORM;
    location ^~ /.well-known/acme-challenge/ {
        root APP_DIR/infra/nginx/acme-webroot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_API;

    ssl_certificate /etc/letsencrypt/live/DOMAIN_APEX/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_APEX/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://fullsales_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN_APEX;

    ssl_certificate /etc/letsencrypt/live/DOMAIN_APEX/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_APEX/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root APP_DIR/apps/portal/dist;
    index index.html;
    client_max_body_size 32m;

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /v1/ {
        proxy_pass http://fullsales_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host DOMAIN_API;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://fullsales_api/health;
        proxy_set_header Host DOMAIN_API;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

