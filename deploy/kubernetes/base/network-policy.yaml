apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-egress
  labels:
    app.kubernetes.io/name: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Postgres / Redis / MinIO (in-cluster or managed endpoints)
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9000
    # DNS + HTTPS (Asaas, CNPJ, object storage)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spa-ingress
  labels:
    app.kubernetes.io/part-of: full-sales
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [admin, portal, platform-admin]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 80
