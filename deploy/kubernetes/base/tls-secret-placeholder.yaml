# Placeholder TLS Secret for kustomize validation.
# Replace with Cloudflare Origin Certificate (OD-15-5) before real traffic:
#   kubectl -n <ns> create secret tls cloudflare-origin-tls \
#     --cert=origin.pem --key=origin-key.pem
#
# NEVER commit real Origin private keys.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-origin-tls
  labels:
    app.kubernetes.io/name: cloudflare-origin-tls
type: kubernetes
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER_REPLACE_WITH_CLOUDFLARE_ORIGIN_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER_REPLACE_WITH_CLOUDFLARE_ORIGIN_KEY
    -----END PRIVATE KEY-----
