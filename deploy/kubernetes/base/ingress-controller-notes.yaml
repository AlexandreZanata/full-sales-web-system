# Install Nginx Ingress Controller (once per cluster).
# Docs: docs/deployment/nginx-ingress.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-install-notes
  labels:
    app.kubernetes.io/name: ingress-notes
data:
  helm: |
    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
    helm repo update
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
      --namespace ingress-nginx --create-namespace \
      --set controller.service.type=LoadBalancer \
      --set controller.config.use-forwarded-headers=true \
      --set controller.config.compute-full-forwarded-for=true \
      --set controller.config.proxy-real-ip-cidr=173.245.48.0/20\\,103.21.244.0/22\\,103.22.200.0/22\\,103.31.4.0/22\\,141.101.64.0/18\\,108.162.192.0/18\\,190.93.240.0/20\\,188.114.96.0/20\\,197.234.240.0/22\\,198.41.128.0/17\\,162.158.0.0/15\\,104.16.0.0/13\\,104.24.0.0/14\\,172.64.0.0/13\\,131.0.72.0/22
  note: |
    Restrict proxy-real-ip-cidr to current Cloudflare IP ranges:
    https://www.cloudflare.com/ips/
