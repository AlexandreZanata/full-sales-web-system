apiVersion: batch/v1
kind: Job
metadata:
  name: fullsales-migrate
  labels:
    app.kubernetes.io/name: migrate
  annotations:
    # Re-apply with a new name/hash each release, or delete the Job before apply.
    description: "One-shot sqlx migrate before API rollout"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: migrate
          image: ghcr.io/example/fullsales-api:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/fullsales-migrate"]
          envFrom:
            - secretRef:
                name: api-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
