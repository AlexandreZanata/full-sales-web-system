apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fullsales-prod
resources:
  - namespace.yaml
  - ../../base
images:
  - name: ghcr.io/example/fullsales-api
    newTag: prod
  - name: ghcr.io/example/fullsales-admin
    newTag: prod
  - name: ghcr.io/example/fullsales-portal
    newTag: prod
  - name: ghcr.io/example/fullsales-platform-admin
    newTag: prod
patches:
  - path: api-replicas-patch.yaml
  - path: api-hpa-patch.yaml
  - path: api-secret.yaml
labels:
  - pairs:
      fullsales.io/env: prod
    includeSelectors: false
