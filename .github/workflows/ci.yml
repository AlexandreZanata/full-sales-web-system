name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: full_sales_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/full_sales_test

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-audit

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: sqlx migrate
        run: sqlx migrate run

      - name: domain-shared coverage
        run: cargo llvm-cov -p domain-shared --fail-under-lines 100 --summary-only

      - name: cargo audit
        run: cargo audit

  node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint

      - name: Validate OpenAPI
        run: pnpm validate:openapi

      - name: pnpm test
        run: pnpm test

      - name: pnpm build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Admin E2E (Playwright)
        run: pnpm test:e2e:admin

      - name: Portal E2E (Playwright)
        run: pnpm test:e2e:portal

      - name: Field E2E (Playwright)
        run: pnpm test:e2e:field

      - name: Integration E2E (skips if API unavailable)
        run: pnpm test:e2e:integration

  kmp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps-mobile/field

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle check and assembleDebug
        run: ./gradlew :shared:check :androidApp:lint :androidApp:assembleDebug

  seller-kmp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps-mobile/seller

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Seller Gradle check and assembleDebug
        run: ./gradlew :shared:check :composeApp:compileDebugKotlinAndroid :androidApp:assembleDebug

  seller-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps-mobile/seller

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile iOS simulator targets
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 :composeApp:compileKotlinIosSimulatorArm64
